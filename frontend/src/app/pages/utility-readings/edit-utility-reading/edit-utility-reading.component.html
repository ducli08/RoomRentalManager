<div>
  <nz-alert *ngIf="data.reading.isLockedByPayment" nzType="error"
    nzMessage="Không thể sửa vì hóa đơn đã có thanh toán." nzShowIcon class="mb-16"></nz-alert>

  <p><strong>Phòng:</strong> {{ data.reading.roomName }} | <strong>Người thuê:</strong> {{ data.reading.tenantName }}</p>
  <p><strong>Tháng/Năm:</strong> {{ data.reading.month }}/{{ data.reading.year }}</p>
  <p><strong>Kỳ thu:</strong> {{ billingPeriodLabel(data.reading, prepare) }}
    <span *ngIf="occupancyDays(data.reading, prepare) as days"> ({{ days }} ngày)</span>
  </p>

  <form nz-form nzLayout="vertical" [formGroup]="form">
    <nz-form-item>
      <nz-form-label>Chỉ số điện cũ</nz-form-label>
      <nz-form-control>
        <input nz-input [value]="prepare?.oldElectricIndex ?? data.reading.oldElectricIndex" readonly />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>Chỉ số điện mới</nz-form-label>
      <nz-form-control>
        <input nz-input type="number" formControlName="newElectricIndex" [readonly]="data.reading.isLockedByPayment" />
      </nz-form-control>
    </nz-form-item>
    <nz-form-item>
      <nz-form-label>Tiêu thụ điện</nz-form-label>
      <nz-form-control>
        <input nz-input [value]="electricUsage" readonly />
      </nz-form-control>
    </nz-form-item>
  </form>
</div>
